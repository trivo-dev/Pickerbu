<div class="wrap">
  <mat-card class="block">
    <mat-card-header>
      <mat-card-title>Hồ sơ</mat-card-title>
      <mat-card-subtitle>Cập nhật thông tin tài khoản (bảng users)</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="profileForm" (ngSubmit)="saveProfile()">
        <mat-form-field appearance="outline" class="field">
          <mat-label>Tên</mat-label>
          <input matInput formControlName="firstName" autocomplete="given-name" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="field">
          <mat-label>Họ</mat-label>
          <input matInput formControlName="lastName" autocomplete="family-name" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="field">
          <mat-label>Số điện thoại</mat-label>
          <input matInput formControlName="phone" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="field">
          <mat-label>URL ảnh đại diện</mat-label>
          <input matInput formControlName="avatarUrl" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="field">
          <mat-label>Địa chỉ</mat-label>
          <input matInput formControlName="address" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="field">
          <mat-label>Trình độ (level)</mat-label>
          <input matInput formControlName="level" placeholder="Beginner, Intermediate…" />
        </mat-form-field>
        <div class="actions">
          <button mat-flat-button color="primary" type="submit" [disabled]="profileBusy()">
            @if (profileBusy()) {
              <mat-spinner diameter="20" />
            } @else {
              Lưu hồ sơ
            }
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>

  <mat-accordion class="block">
    <mat-expansion-panel>
      <mat-expansion-panel-header>
        <mat-panel-title>Đổi mật khẩu</mat-panel-title>
      </mat-expansion-panel-header>
      <form [formGroup]="passwordForm" (ngSubmit)="changePassword()">
        <mat-form-field appearance="outline" class="field">
          <mat-label>Mật khẩu hiện tại</mat-label>
          <input matInput type="password" formControlName="currentPassword" autocomplete="current-password" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="field">
          <mat-label>Mật khẩu mới</mat-label>
          <input matInput type="password" formControlName="newPassword" autocomplete="new-password" />
          <mat-hint>Ít nhất 8 ký tự</mat-hint>
        </mat-form-field>
        <mat-form-field appearance="outline" class="field">
          <mat-label>Nhập lại mật khẩu mới</mat-label>
          <input matInput type="password" formControlName="newPassword2" autocomplete="new-password" />
          @if (passwordForm.touched && passwordForm.hasError("mismatch")) {
            <mat-error>Không khớp với mật khẩu mới</mat-error>
          }
        </mat-form-field>
        <div class="actions">
          <button mat-stroked-button color="primary" type="submit" [disabled]="passwordBusy()">
            @if (passwordBusy()) {
              <mat-spinner diameter="20" />
            } @else {
              Đổi mật khẩu
            }
          </button>
        </div>
      </form>
    </mat-expansion-panel>
  </mat-accordion>
</div>
